<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found | BSA</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #f5f0e8;
    font-family: 'Cormorant Garamond', serif;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    text-align: center;
    padding: 2rem;
  }
  .container { max-width: 500px; }
  .code {
    font-family: 'Syne', sans-serif;
    font-size: 8rem; font-weight: 800;
    color: #c9a84c; opacity: 0.15;
    line-height: 1; margin-bottom: -2rem;
  }
  h1 {
    font-size: 2.5rem; font-weight: 300;
    color: #f5f0e8; margin-bottom: 1rem;
  }
  h1 em { font-style: italic; color: #c9a84c; }
  p {
    font-size: 1.05rem; font-weight: 300; line-height: 1.75;
    color: rgba(245,240,232,0.5); margin-bottom: 2.5rem;
  }
  a {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 0.9rem 2rem;
    background: #c9a84c; color: #0a0a0f;
    text-decoration: none; display: inline-block;
    transition: background 0.2s;
  }
  a:hover { background: #e8c96a; }
</style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <h1>Page <em>not found</em></h1>
    <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <a href="/bsa-landing/">← Return to Homepage</a>
  </div>
</body>
</html>
